<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Analytical Chart Terminal</title>
    <style>
        body { margin: 0; background-color: #131722; font-family: sans-serif; color: #d1d4dc; padding: 5px; overflow: hidden; }
        .header { background: #1c2030; padding: 10px 15px; display: flex; gap: 25px; border-radius: 4px; margin-bottom: 5px; border: 1px solid #2b2e3a; font-size: 13px; }
        .header-val { font-weight: bold; margin-left: 5px; color: #26a69a; }
        #chart-container { width: 100%; height: calc(100vh - 55px); position: relative; background-color: #131722; border: 1px solid #2b2e3a; box-sizing: border-box; }
        #canvas { width: 100%; height: 100%; display: block; }
    </style>
</head>
<body>

    <div class="header">
        <div>Asset: <span id="asset-display" class="header-val" style="color: #ff9800;">CONNECTING...</span></div>
        <div>Zone Status: <span id="zone-status" class="header-val" style="color: #26a69a;">CONNECTED</span></div>
        <div>Last Price: <span id="live-price" class="header-val" style="color: #ff9800;">SYNCING...</span></div>
    </div>

    <div id="chart-container">
        <canvas id="canvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        function resizeCanvas() {
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight || 680;
            renderChartCore();
        }

        function renderChartCore() {
            // Background cleanup
            ctx.fillStyle = '#131722';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            let currentAsset = window.currentAsset || "NIFTY";
            
            // Checking active data pipeline availability
            if (!window.chartData || !window.chartData[currentAsset]) {
                ctx.fillStyle = '#787b86';
                ctx.font = '14px sans-serif';
                ctx.fillText("Awaiting structural stream baseline matrix...", 40, canvas.height / 2);
                return;
            }

            const dataNode = window.chartData[currentAsset];
            
            // Instant UI Header Metrics update channel
            document.getElementById('asset-display').innerText = currentAsset + " LIVE";
            if (dataNode.price > 0) {
                document.getElementById('live-price').innerText = (dataNode.price / 100).toFixed(2);
            }

            const history = dataNode.master_history;
            if (!history || history.length === 0) return;

            // Geometry metrics parameters mapping
            const sidebarWidth = 85;
            const cWidth = canvas.width - sidebarWidth;
            const cHeight = canvas.height - 20;

            // Simple neat grid line indicators rendering logic channel
            ctx.strokeStyle = '#232634';
            ctx.lineWidth = 1;
            for(let i = 50; i < cWidth; i += 80) {
                ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, cHeight); ctx.stroke();
            }
            for(let j = 50; j < cHeight; j += 50) {
                ctx.beginPath(); ctx.moveTo(0, j); ctx.lineTo(cWidth, j); ctx.stroke();
            }

            // Right price sidebar layout fill enforcer variables parameters
            ctx.fillStyle = '#1c2030';
            ctx.fillRect(cWidth, 0, sidebarWidth, canvas.height);
            ctx.strokeStyle = '#2b2e3a';
            ctx.beginPath(); ctx.moveTo(cWidth, 0); ctx.lineTo(cWidth, canvas.height); ctx.stroke();

            // Extract core numbers to compute scale bounds mappings variables
            let displayCandles = history.slice(-50);
            let highs = displayCandles.map(c => parseFloat(c.high));
            let lows = displayCandles.map(c => parseFloat(c.low));
            
            let maxP = Math.max(...highs);
            let minP = Math.min(...lows);
            let pRange = maxP - minP || 10;
            
            maxP += pRange * 0.08;
            minP -= pRange * 0.08;
            pRange = maxP - minP;

            function getY(price) {
                return cHeight - 30 - ((price - minP) / pRange) * (cHeight - 60);
            }

            // Draw Right Sidebar Prices Matrix text labels track
            ctx.fillStyle = '#787b86';
            ctx.font = '11px sans-serif';
            ctx.textBaseline = 'middle';
            for (let k = 0; k <= 6; k++) {
                let pVal = minP + (pRange * (k / 6));
                ctx.fillText(pVal.toFixed(1), cWidth + 8, getY(pVal));
            }

            // Render exact Green and Red structural candle bars mapping
            let gap = cWidth / displayCandles.length;
            let cWidthBar = gap * 0.65;

            displayCandles.forEach((bar, idx) => {
                let x = idx * gap + (gap * 0.15);
                let yOpen = getY(bar.open);
                let yClose = getY(bar.close);
                let yHigh = getY(bar.high);
                let yLow = getY(bar.low);

                let isGreen = bar.close >= bar.open;
                let color = isGreen ? '#26a69a' : '#ef5350';

                ctx.strokeStyle = color;
                ctx.fillStyle = color;
                ctx.lineWidth = 1.5;

                // Wicks mapping enforcer variables configurations channel parameters
                ctx.beginPath();
                ctx.moveTo(x + cWidthBar / 2, yHigh);
                ctx.lineTo(x + cWidthBar / 2, yLow);
                ctx.stroke();

                // Candle Solid body layout parameters structure engine channel
                let hBody = Math.abs(yClose - yOpen) || 2;
                ctx.fillRect(x, Math.min(yOpen, yClose), cWidthBar, hBody);

                // Right price tracker alert execution parameter block mapping values
                if (idx === displayCandles.length - 1) {
                    ctx.fillRect(cWidth + 1, Math.min(yOpen, yClose) - 8, sidebarWidth - 2, 16);
                    ctx.fillStyle = '#ffffff';
                    ctx.font = 'bold 10px sans-serif';
                    ctx.fillText(bar.close.toFixed(2), cWidth + 6, Math.min(yOpen, yClose));
                }
            });
        }

        // Processing continuous messages from target parent frame context structure parameters channel
        window.addEventListener("message", function(e) {
            if (e.data && e.data.type === "LIVE_TICK_UPDATE") {
                window.chartData = e.data.payload;
                window.currentAsset = e.data.asset;
                renderChartCore();
            }
        });

        // Event trigger sequence enforcers map variables logic execution
        window.addEventListener('resize', resizeCanvas);
        
        // Periodic rendering engine sweep controller layer
        setInterval(renderChartCore, 800);
        
        // Immediate launch block execution track matrix parameters
        setTimeout(() => {
            resizeCanvas();
        }, 150);
    </script>
</body>
</html>
