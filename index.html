<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TradingView Streamlit Terminal</title>
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        body { margin: 0; background-color: #131722; font-family: sans-serif; color: #d1d4dc; padding: 5px; overflow: hidden; }
        .header { background: #1c2030; padding: 10px 15px; display: flex; gap: 25px; border-radius: 4px; margin-bottom: 5px; border: 1px solid #2b2e3a; font-size: 13px; }
        .header-val { font-weight: bold; margin-left: 5px; color: #26a69a; }
        #chart-container { width: 100%; height: calc(100vh - 55px); position: relative; }
    </style>
</head>
<body>

    <div class="header">
        <div>Asset: <span id="asset-display" class="header-val">Awaiting...</span></div>
        <div>Zone Status: <span id="zone-status" class="header-val" style="color: #26a69a;">CONNECTED</span></div>
        <div>Last Price: <span id="live-price" class="header-val">Awaiting Tick...</span></div>
    </div>

    <div id="chart-container"></div>

    <script>
        const container = document.getElementById('chart-container');
        
        const chart = LightweightCharts.createChart(container, {
            width: container.clientWidth,
            height: container.clientHeight,
            layout: { backgroundColor: '#131722', textColor: '#d1d4dc' },
            grid: { vertLines: { color: '#232634' }, horzLines: { color: '#232634' } },
            crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
            priceScale: { borderColor: '#2b2e3a', autoScale: true },
            timeScale: { borderColor: '#2b2e3a', timeVisible: true }
        });

        const candlestickSeries = chart.addCandlestickSeries({
            upColor: '#26a69a', downColor: '#ef5350',
            borderUpColor: '#26a69a', borderDownColor: '#ef5350',
            wickUpColor: '#26a69a', wickDownColor: '#ef5350'
        });

        function syncTradingViewData() {
            let currentAsset = window.currentAsset || "NIFTY";
            
            if (window.chartData && window.chartData[currentAsset]) {
                const targetNode = window.chartData[currentAsset];
                
                if (targetNode.price > 0) {
                    document.getElementById('live-price').innerText = (targetNode.price / 100).toFixed(2);
                }
                
                document.getElementById('asset-display').innerText = currentAsset + " LIVE";

                if (targetNode.master_history && targetNode.master_history.length > 0) {
                    const formattedBars = [];
                    const seenTimes = new Set();

                    for (let bar of targetNode.master_history) {
                        // Direct integer unix mapping engine to fix empty visual render bugs
                        let cleanTime = typeof bar.time === 'number' ? bar.time : Math.floor(new Date(bar.time).getTime() / 1000);
                        
                        if (isNaN(cleanTime)) {
                            cleanTime = Math.floor(Date.now() / 1000);
                        }

                        if (!seenTimes.has(cleanTime)) {
                            seenTimes.add(cleanTime);
                            formattedBars.push({
                                time: cleanTime,
                                open: parseFloat(bar.open),
                                high: parseFloat(bar.high),
                                low: parseFloat(bar.low),
                                close: parseFloat(bar.close)
                            });
                        }
                    }
                    
                    if (formattedBars.length > 0) {
                        formattedBars.sort((a, b) => a.time - b.time);
                        candlestickSeries.setData(formattedBars);
                    }
                }
            }
        }

        window.addEventListener("message", function(e) {
            if (e.data && e.data.type === "LIVE_TICK_UPDATE") {
                window.chartData = e.data.payload;
                if(e.data.asset) window.currentAsset = e.data.asset;
                syncTradingViewData();
            }
        });

        setTimeout(syncTradingViewData, 200);
        setInterval(syncTradingViewData, 1000);
        window.addEventListener('resize', () => { chart.resize(container.clientWidth, container.clientHeight); });
    </script>
</body>
</html>
