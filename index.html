<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Clean Responsive Trading Terminal</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #131722; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden; color: #ffffff; user-select: none; -webkit-user-select: none;
        }
        #top-header-bar {
            height: 40px; background-color: #1c2030; display: flex; align-items: center;
            padding: 0 12px; border-bottom: 1px solid #2a2e39; font-size: 11px; font-weight: 600;
        }
        .matrix-item { margin-right: 15px; }
        .matrix-lbl { color: #848e9c; margin-right: 4px; }
        .matrix-val.orange { color: #ff9800; }
        .matrix-val.green { color: #089981; }
        #chart-container {
            position: relative; width: 100%; height: calc(100vh - 40px);
            touch-action: none;
        }
        canvas { display: block; position: absolute; left: 0; top: 0; width: 100%; height: 100%; }
    </style>
</head>
<body>

<div id="top-header-bar">
    <div class="matrix-item"><span class="matrix-lbl">Asset:</span><span id="lbl-asset" class="matrix-val orange">NIFTY LIVE</span></div>
    <div class="matrix-item"><span class="matrix-lbl">Status:</span><span class="matrix-val green">CONNECTED</span></div>
    <div class="matrix-item"><span class="matrix-lbl">LTP:</span><span id="lbl-price" class="matrix-val orange">0.00</span></div>
</div>

<div id="chart-container">
    <canvas id="chartCanvas"></canvas>
</div>

<script>
    const canvas = document.getElementById('chartCanvas');
    const ctx = canvas.getContext('2d');
    const container = document.getElementById('chart-container');
    
    let chartData = [];
    let currentAsset = "NIFTY";

    // Controls Matrix Variables
    let zoomLevel = 1.0; 
    let panOffset = 0;   
    let isDragging = false;
    let startX = 0;
    let lastTouchDistance = 0;

    function resizeCanvas() {
        const dpr = window.devicePixelRatio || 1;
        canvas.width = container.clientWidth * dpr;
        canvas.height = container.clientHeight * dpr;
        ctx.scale(dpr, dpr);
        renderChart();
    }

    window.addEventListener('resize', resizeCanvas);

    window.addEventListener('message', function(e) {
        const data = e.data;
        let payload = null;
        
        if (data.type === "LIVE_TICK_UPDATE" && data.payload) {
            payload = data.payload;
            currentAsset = data.asset || "NIFTY";
        } else if (data.type === "DYNAMIC_TERMINAL_RELOAD" && data.data) {
            payload = data.data;
            currentAsset = payload.current_asset || "NIFTY";
        } else if (data && data.master_history) {
            payload = { [currentAsset]: data };
        }

        if (payload) {
            document.getElementById('lbl-asset').innerText = currentAsset + " LIVE";
            const assetData = payload[currentAsset] || payload;
            if (assetData) {
                if (assetData.price) {
                    document.getElementById('lbl-price').innerText = (assetData.price / 100).toFixed(2);
                }
                chartData = assetData.master_history || [];
                renderChart();
            }
        }
    });

    // Touch Support Control Mechanisms for Mobile Viewing
    container.addEventListener('touchstart', function(e) {
        if (e.touches.length === 1) {
            isDragging = true;
            startX = e.touches[0].clientX - panOffset;
        } else if (e.touches.length === 2) {
            isDragging = false;
            lastTouchDistance = Math.hypot(
                e.touches[0].clientX - e.touches[1].clientX,
                e.touches[0].clientY - e.touches[1].clientY
            );
        }
    }, { passive: false });

    container.addEventListener('touchmove', function(e) {
        e.preventDefault();
        if (isDragging && e.touches.length === 1) {
            panOffset = e.touches[0].clientX - startX;
            renderChart();
        } else if (e.touches.length === 2) {
            const currentDistance = Math.hypot(
                e.touches[0].clientX - e.touches[1].clientX,
                e.touches[0].clientY - e.touches[1].clientY
            );
            if (lastTouchDistance > 0) {
                const delta = currentDistance / lastTouchDistance;
                zoomLevel = Math.max(0.4, Math.min(zoomLevel * delta, 3.5));
                renderChart();
            }
            lastTouchDistance = currentDistance;
        }
    }, { passive: false });

    container.addEventListener('touchend', function() {
        isDragging = false;
        lastTouchDistance = 0;
    });

    container.addEventListener('wheel', function(e) {
        e.preventDefault();
        const factor = e.deltaY < 0 ? 1.08 : 0.92;
        zoomLevel = Math.max(0.4, Math.min(zoomLevel * factor, 3.5));
        renderChart();
    }, { passive: false });

    // ==============================================================================
    // 🎨 CHRONONLOGICAL LEFT-TO-RIGHT CLEAN CHART PLOTTER
    // ==============================================================================
    function renderChart() {
        const w = container.clientWidth;
        const h = container.clientHeight;
        
        ctx.clearRect(0, 0, w, h);
        if (!chartData || chartData.length === 0) return;

        // Clean Margins: Fully optimized for mobile screens
        const paddingLeft = 10;
        const paddingRight = 65;
        const paddingTop = 20;
        const paddingBottom = 20; // Zeroed lower panel spacing constraints

        const chartWidth = w - paddingLeft - paddingRight;
        const chartHeight = h - paddingTop - paddingBottom;

        const isSmallScreen = w < 600;
        const baseBarsCount = isSmallScreen ? 28 : 60;
        const maxBarsVisible = Math.max(10, Math.round(baseBarsCount / zoomLevel));
        
        // Fetch trailing slice sequence
        const activeBars = chartData.slice(-maxBarsVisible);
        const totalActive = activeBars.length;

        let maxPrice = -Infinity;
        let minPrice = Infinity;

        activeBars.forEach(d => {
            if (d.high > maxPrice) maxPrice = d.high;
            if (d.low < minPrice) minPrice = d.low;
            if (d.vwap && d.vwap > maxPrice) maxPrice = d.vwap;
            if (d.vwap && d.vwap < minPrice) minPrice = d.vwap;
            if (d.ma20 && d.ma20 > maxPrice) maxPrice = d.ma20;
            if (d.ma20 && d.ma20 < minPrice) minPrice = d.ma20;
            if (d.ma50 && d.ma50 > maxPrice) maxPrice = d.ma50;
            if (d.ma50 && d.ma50 < minPrice) minPrice = d.ma50;
            if (d.supertrend && d.supertrend > maxPrice) maxPrice = d.supertrend;
            if (d.supertrend && d.supertrend < minPrice) minPrice = minPrice = d.supertrend;
        });

        const priceRange = maxPrice - minPrice;
        const verticalBuffer = priceRange === 0 ? 10.0 : priceRange * 0.10;
        maxPrice += verticalBuffer;
        minPrice -= verticalBuffer;
        const finalRange = maxPrice - minPrice;

        // Draw standard clean dark grids lines
        ctx.strokeStyle = '#2a2e39';
        ctx.lineWidth = 1;
        ctx.fillStyle = '#848e9c';
        ctx.font = '10px sans-serif';

        for (let i = 0; i <= 4; i++) {
            const y = paddingTop + (chartHeight * (i / 4));
            const p = maxPrice - (finalRange * (i / 4));
            ctx.beginPath();
            ctx.moveTo(paddingLeft, y);
            ctx.lineTo(paddingLeft + chartWidth, y);
            ctx.stroke();
            ctx.fillText(p.toFixed(2), paddingLeft + chartWidth + 5, y + 3);
        }

        const candleSpacing = chartWidth / maxBarsVisible;
        const candleWidth = Math.max(candleSpacing * 0.70, 3.5);

        // STRICT TRADINGVIEW LAYOUT: Old items left, latest updates lock to the right border
        activeBars.forEach((bar, index) => {
            const x = paddingLeft + (index * candleSpacing) + (candleSpacing / 2) + panOffset;
            
            if (x < paddingLeft || x > (paddingLeft + chartWidth)) return;

            const yOpen = paddingTop + chartHeight * (1 - (bar.open - minPrice) / finalRange);
            const yClose = paddingTop + chartHeight * (1 - (bar.close - minPrice) / finalRange);
            const yHigh = paddingTop + chartHeight * (1 - (bar.high - minPrice) / finalRange);
            const yLow = paddingTop + chartHeight * (1 - (bar.low - minPrice) / finalRange);

            const isGreen = bar.close >= bar.open;
            const color = isGreen ? '#089981' : '#f23645';

            ctx.strokeStyle = color;
            ctx.fillStyle = color;
            ctx.lineWidth = 1.5;

            // Draw Candle Wicks
            ctx.beginPath();
            ctx.moveTo(x, yHigh);
            ctx.lineTo(x, yLow);
            ctx.stroke();

            // Draw Candle Bodies
            const top = Math.min(yOpen, yClose);
            const bottom = Math.max(yOpen, yClose);
            let height = bottom - top;
            if (height < 1.5) height = 1.5;

            ctx.fillRect(x - (candleWidth / 2), top, candleWidth, height);

            // DRAW CONTINUOUS NON-OVERLAPPING TECHNICAL LINES
            if (index > 0) {
                const prevX = x - candleSpacing;
                const prevBar = activeBars[index - 1];

                const drawOverlayLine = (pVal, cVal, lineColor, lineWidth = 1.2) => {
                    if (pVal && cVal && pVal >= minPrice && pVal <= maxPrice && cVal >= minPrice && cVal <= maxPrice) {
                        ctx.strokeStyle = lineColor; 
                        ctx.lineWidth = lineWidth;
                        ctx.beginPath();
                        ctx.moveTo(prevX, paddingTop + chartHeight * (1 - (pVal - minPrice) / finalRange));
                        ctx.lineTo(x, paddingTop + chartHeight * (1 - (cVal - minPrice) / finalRange));
                        ctx.stroke();
                    }
                };

                drawOverlayLine(prevBar.vwap, bar.vwap, '#ffeb3b', 1.2);             // VWAP Line (Yellow)
                drawOverlayLine(prevBar.ma20, bar.ma20, '#2196f3', 1.2);             // MA20 Line (Blue)
                drawOverlayLine(prevBar.ma50, bar.ma50, '#9c27b0', 1.2);             // MA50 Line (Purple)
                drawOverlayLine(prevBar.supertrend, bar.supertrend, '#e91e63', 1.5); // Supertrend Line (Pink)
            }
        });
    }

    setTimeout(resizeCanvas, 150);
</script>

</body>
</html>
