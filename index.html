<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Clean Responsive Trading Terminal</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #131722; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden; color: #ffffff; user-select: none; -webkit-user-select: none;
        }
        #top-header-bar {
            height: 45px; background-color: #1c2030; display: flex; align-items: center;
            padding: 0 12px; border-bottom: 1px solid #2a2e39; font-size: 11px; font-weight: 600;
            flex-wrap: wrap; overflow: hidden;
        }
        .matrix-item { display: flex; align-items: center; margin-right: 14px; margin-bottom: 2px; }
        .matrix-lbl { color: #848e9c; margin-right: 4px; }
        .matrix-val.orange { color: #ff9800; }
        .matrix-val.green { color: #089981; }
        
        /* Legend indicators identity tags */
        .ind-badge { padding: 2px 5px; border-radius: 3px; font-size: 10px; margin-left: 4px; display: inline-flex; align-items: center; }
        .ind-vwap { background: rgba(255, 235, 59, 0.15); color: #ffeb3b; }
        .ind-ma20 { background: rgba(33, 150, 243, 0.15); color: #2196f3; }
        .ind-ma50 { background: rgba(156, 39, 176, 0.15); color: #9c27b0; }
        .ind-st { background: rgba(8, 153, 129, 0.15); color: #089981; }
        
        #chart-container {
            position: relative; width: 100%; height: calc(100vh - 45px);
            touch-action: none;
        }
        canvas { display: block; position: absolute; left: 0; top: 0; width: 100%; height: 100%; }
    </style>
</head>
<body>

<div id="top-header-bar">
    <div class="matrix-item"><span class="matrix-lbl">Asset:</span><span id="lbl-asset" class="matrix-val orange">NIFTY LIVE</span></div>
    <div class="matrix-item"><span class="matrix-lbl">LTP:</span><span id="lbl-price" class="matrix-val orange">0.00</span></div>
    <div class="matrix-item"><span class="ind-badge ind-vwap">🟡 VWAP</span></div>
    <div class="matrix-item"><span class="ind-badge ind-ma20">🔵 MA(20)</span></div>
    <div class="matrix-item"><span class="ind-badge ind-ma50">🟣 MA(50)</span></div>
    <div class="matrix-item"><span class="ind-badge ind-st">🟢🔴 Supertrend Dots</span></div>
</div>

<div id="chart-container">
    <canvas id="chartCanvas"></canvas>
</div>

<script>
    const canvas = document.getElementById('chartCanvas');
    const ctx = canvas.getContext('2d');
    const container = document.getElementById('chart-container');
    
    let chartData = [];
    let currentAsset = "NIFTY";

    let zoomLevel = 1.0; 
    let panOffset = 0;   
    let isDragging = false;
    let startX = 0;
    let lastTouchDistance = 0;

    function resizeCanvas() {
        const dpr = window.devicePixelRatio || 1;
        canvas.width = container.clientWidth * dpr;
        canvas.height = container.clientHeight * dpr;
        ctx.scale(dpr, dpr);
        renderChart();
    }

    window.addEventListener('resize', resizeCanvas);

    window.addEventListener('message', function(e) {
        const data = e.data;
        let payload = null;
        
        if (data.type === "LIVE_TICK_UPDATE" && data.payload) {
            payload = data.payload;
            currentAsset = data.asset || "NIFTY";
        } else if (data.type === "DYNAMIC_TERMINAL_RELOAD" && data.data) {
            payload = data.data;
            currentAsset = payload.current_asset || "NIFTY";
        } else if (data && data.master_history) {
            payload = { [currentAsset]: data };
        }

        if (payload) {
            document.getElementById('lbl-asset').innerText = currentAsset + " LIVE";
            const assetData = payload[currentAsset] || payload;
            if (assetData) {
                if (assetData.price) {
                    document.getElementById('lbl-price').innerText = (assetData.price / 100).toFixed(2);
                }
                chartData = assetData.master_history || [];
                renderChart();
            }
        }
    });

    // Touch Support Mobile Handlers Matrix
    container.addEventListener('touchstart', function(e) {
        if (e.touches.length === 1) { isDragging = true; startX = e.touches[0].clientX - panOffset; }
        else if (e.touches.length === 2) {
            isDragging = false;
            lastTouchDistance = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
        }
    });

    container.addEventListener('touchmove', function(e) {
        if (isDragging && e.touches.length === 1) {
            panOffset = e.touches[0].clientX - startX;
            renderChart();
        } else if (e.touches.length === 2) {
            const currentDistance = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
            if (lastTouchDistance > 0) {
                zoomLevel = Math.max(0.4, Math.min(zoomLevel * (currentDistance / lastTouchDistance), 3.5));
                renderChart();
            }
            lastTouchDistance = currentDistance;
        }
    });

    container.addEventListener('touchend', function() { isDragging = false; lastTouchDistance = 0; });
    container.addEventListener('wheel', function(e) {
        e.preventDefault();
        zoomLevel = Math.max(0.4, Math.min(zoomLevel * (e.deltaY < 0 ? 1.08 : 0.92), 3.5));
        renderChart();
    });

    // ==============================================================================
    // 🎨 CHRONOLOGICAL LEFT-TO-RIGHT GRAPHICS CORE ENGINE
    // ==============================================================================
    function renderChart() {
        const w = container.clientWidth;
        const h = container.clientHeight;
        
        ctx.clearRect(0, 0, w, h);
        if (!chartData || chartData.length === 0) return;

        const paddingLeft = 10;
        const paddingRight = 65;
        const paddingTop = 25;
        const paddingBottom = 20;

        const chartWidth = w - paddingLeft - paddingRight;
        const chartHeight = h - paddingTop - paddingBottom;

        const maxBarsVisible = Math.max(10, Math.round((w < 600 ? 28 : 60) / zoomLevel));
        const activeBars = chartData.slice(-maxBarsVisible);
        const totalActive = activeBars.length;

        let maxPrice = -Infinity;
        let minPrice = Infinity;

        activeBars.forEach(d => {
            if (d.high > maxPrice) maxPrice = d.high;
            if (d.low < minPrice) minPrice = d.low;
        });

        const priceRange = maxPrice - minPrice;
        const verticalBuffer = priceRange === 0 ? 10.0 : priceRange * 0.08;
        maxPrice += verticalBuffer;
        minPrice -= verticalBuffer;
        const finalRange = maxPrice - minPrice;

        // Draw Standard Coordinate Scale Lines
        ctx.strokeStyle = '#2a2e39'; ctx.lineWidth = 1; ctx.fillStyle = '#848e9c'; ctx.font = '10px sans-serif';
        for (let i = 0; i <= 4; i++) {
            const y = paddingTop + (chartHeight * (i / 4));
            ctx.beginPath(); ctx.moveTo(paddingLeft, y); ctx.lineTo(paddingLeft + chartWidth, y); ctx.stroke();
            ctx.fillText((maxPrice - (finalRange * (i / 4))).toFixed(2), paddingLeft + chartWidth + 5, y + 3);
        }

        const candleSpacing = chartWidth / maxBarsVisible;
        const candleWidth = Math.max(candleSpacing * 0.70, 3.5);

        // First Loop: Process candles and continuous indicator lines (VWAP, MA20, MA50)
        activeBars.forEach((bar, index) => {
            const x = paddingLeft + (index * candleSpacing) + (candleSpacing / 2) + panOffset;
            if (x < paddingLeft || x > (paddingLeft + chartWidth)) return;

            const yOpen = paddingTop + chartHeight * (1 - (bar.open - minPrice) / finalRange);
            const yClose = paddingTop + chartHeight * (1 - (bar.close - minPrice) / finalRange);
            const yHigh = paddingTop + chartHeight * (1 - (bar.high - minPrice) / finalRange);
            const yLow = paddingTop + chartHeight * (1 - (bar.low - minPrice) / finalRange);

            const isGreen = bar.close >= bar.open;
            ctx.strokeStyle = isGreen ? '#089981' : '#f23645';
            ctx.fillStyle = ctx.strokeStyle;
            ctx.lineWidth = 1.5;

            // Draw Shadows
            ctx.beginPath(); ctx.moveTo(x, yHigh); ctx.lineTo(x, yLow); ctx.stroke();
            // Draw Body blocks
            ctx.fillRect(x - (candleWidth / 2), Math.min(yOpen, yClose), candleWidth, Math.max(1.5, Math.abs(yClose - yOpen)));

            // CONNECT CONTINUOUS CONTINUUM INDICATOR STRIPS SMOOTHLY
            if (index > 0) {
                const prevX = x - candleSpacing;
                const prevBar = activeBars[index - 1];

                const drawOverlayLine = (pVal, cVal, lineColor) => {
                    if (pVal && cVal) {
                        let prevN = pVal > maxPrice * 1.5 ? pVal / 100 : pVal;
                        let currN = cVal > maxPrice * 1.5 ? cVal / 100 : cVal;
                        if (prevN >= minPrice && prevN <= maxPrice && currN >= minPrice && currN <= maxPrice) {
                            ctx.strokeStyle = lineColor; ctx.lineWidth = 1.3;
                            ctx.beginPath();
                            ctx.moveTo(prevX, paddingTop + chartHeight * (1 - (prevN - minPrice) / finalRange));
                            ctx.lineTo(x, paddingTop + chartHeight * (1 - (currN - minPrice) / finalRange));
                            ctx.stroke();
                        }
                    }
                };

                drawOverlayLine(prevBar.vwap, bar.vwap, '#ffeb3b'); // Yellow VWAP Line
                drawOverlayLine(prevBar.ma20, bar.ma20, '#2196f3'); // Blue MA20 Line
                drawOverlayLine(prevBar.ma50, bar.ma50, '#9c27b0'); // Purple MA50 Line
            }
        });

        // Second Loop: Draw the isolated discrete dots array for Supertrend to avoid clutter
        activeBars.forEach((bar, index) => {
            const x = paddingLeft + (index * candleSpacing) + (candleSpacing / 2) + panOffset;
            if (x < paddingLeft || x > (paddingLeft + chartWidth)) return;

            // FIXED: Plot custom discrete dots for Supertrend that float cleanly with candle prices
            if (bar.supertrend) {
                let stRaw = bar.supertrend > maxPrice * 1.5 ? bar.supertrend / 100 : bar.supertrend;
                
                if (stRaw >= minPrice && stRaw <= maxPrice) {
                    const ySt = paddingTop + chartHeight * (1 - (stRaw - minPrice) / finalRange);
                    
                    // Dynamic coloring matrix condition: Green if trend is below close, Red if above close
                    const isTrendBullish = bar.close >= stRaw;
                    ctx.fillStyle = isTrendBullish ? '#089981' : '#f23645';
                    
                    ctx.beginPath();
                    ctx.arc(x, ySt, isSmallScreen ? 2 : 2.8, 0, 2 * Math.PI); // Compact responsive dots circles
                    ctx.fill();
                }
            }
        });
    }

    setTimeout(resizeCanvas, 150);
</script>

</body>
</html>
