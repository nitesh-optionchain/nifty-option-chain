<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Advanced Multi-Indicator Terminal</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #131722; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden; color: #ffffff; user-select: none;
        }
        #top-header-bar {
            height: 45px; background-color: #1c2030; display: flex; align-items: center;
            padding: 0 15px; border-bottom: 1px solid #2a2e39; font-size: 12px; font-weight: 600;
        }
        .matrix-item { margin-right: 20px; }
        .matrix-lbl { color: #848e9c; margin-right: 4px; }
        .matrix-val.green { color: #089981; }
        .matrix-val.orange { color: #ff9800; }
        #chart-container { position: relative; width: 100%; height: calc(100vh - 45px); touch-action: none; }
        canvas { display: block; position: absolute; left: 0; top: 0; width: 100%; height: 100%; }
    </style>
</head>
<body>

<div id="top-header-bar">
    <div class="matrix-item"><span class="matrix-lbl">Asset:</span><span id="lbl-asset" class="matrix-val orange">NIFTY LIVE</span></div>
    <div class="matrix-item"><span class="matrix-lbl">Zone Status:</span><span class="matrix-val green">CONNECTED</span></div>
    <div class="matrix-item"><span class="matrix-lbl">Last Price:</span><span id="lbl-price" class="matrix-val orange">0.00</span></div>
</div>

<div id="chart-container">
    <canvas id="chartCanvas"></canvas>
</div>

<script>
    const canvas = document.getElementById('chartCanvas');
    const ctx = canvas.getContext('2d');
    let chartData = [];
    let maxVolZone = 0;
    let maxOiZone = 0;
    let currentAsset = "NIFTY";

    let zoomLevel = 1.0; let panOffset = 0; let isDragging = false; let startX = 0;

    window.addEventListener('message', function(e) {
        const data = e.data;
        if (data.type === "LIVE_TICK_UPDATE" && data.payload && data.asset) {
            currentAsset = data.asset;
            document.getElementById('lbl-asset').innerText = currentAsset + " LIVE";
            if (data.payload[currentAsset]) {
                document.getElementById('lbl-price').innerText = (data.payload[currentAsset].price / 100).toFixed(2);
                chartData = data.payload[currentAsset].master_history || [];
                maxVolZone = data.payload[currentAsset].max_vol_zone || 0;
                maxOiZone = data.payload[currentAsset].max_oi_zone || 0;
                renderChart();
            }
        }
    });

    function renderChart() {
        const w = canvas.parentElement.clientWidth;
        const h = canvas.parentElement.clientHeight;
        canvas.width = w * (window.devicePixelRatio || 1);
        canvas.height = h * (window.devicePixelRatio || 1);
        ctx.scale(window.devicePixelRatio || 1, window.devicePixelRatio || 1);
        
        ctx.clearRect(0, 0, w, h);
        if (chartData.length === 0) return;

        const paddingLeft = 15; const paddingRight = 75; const paddingTop = 30; const paddingBottom = 120;
        const chartWidth = w - paddingLeft - paddingRight; const chartHeight = h - paddingTop - paddingBottom;

        const maxBarsVisible = Math.max(15, Math.round(50 / zoomLevel));
        const activeBars = chartData.slice(-maxBarsVisible);

        let maxPrice = -Infinity; let minPrice = Infinity;
        activeBars.forEach(d => {
            maxPrice = Math.max(maxPrice, d.high, d.vwap, d.ma50);
            minPrice = Math.min(minPrice, d.low, d.vwap, d.ma50);
        });

        // Lock institutional boundaries bounds into vertical scaling matrix
        if(maxVolZone > 0) { maxPrice = Math.max(maxPrice, maxVolZone); minPrice = Math.min(minPrice, maxVolZone); }
        if(maxOiZone > 0) { maxPrice = Math.max(maxPrice, maxOiZone); minPrice = Math.min(minPrice, maxOiZone); }

        const finalRange = (maxPrice - minPrice) * 1.15;
        minPrice -= finalRange * 0.05;

        // 1. DRAW INSTITUTIONAL HIGH VOL & OI FROZEN ZONES (Horizontal Rays)
        if (maxVolZone > 0) {
            const yVol = paddingTop + chartHeight * (1 - (maxVolZone - minPrice) / finalRange);
            ctx.strokeStyle = 'rgba(255, 152, 0, 0.7)'; ctx.lineWidth = 2; ctx.setLineDash([6, 4]);
            ctx.beginPath(); ctx.moveTo(paddingLeft, yVol); ctx.lineTo(paddingLeft + chartWidth, yVol); ctx.stroke();
            ctx.fillStyle = '#ff9800'; ctx.font = 'bold 10px sans-serif';
            ctx.fillText("📌 MAX VOL ZONE (" + maxVolZone.toFixed(2) + ")", paddingLeft + 10, yVol - 4);
        }
        if (maxOiZone > 0) {
            const yOi = paddingTop + chartHeight * (1 - (maxOiZone - minPrice) / finalRange);
            ctx.strokeStyle = 'rgba(0, 188, 212, 0.7)'; ctx.lineWidth = 2; ctx.setLineDash([6, 4]);
            ctx.beginPath(); ctx.moveTo(paddingLeft, yOi); ctx.lineTo(paddingLeft + chartWidth, yOi); ctx.stroke();
            ctx.fillStyle = '#00bcd4'; ctx.fillText("📊 MAX OI ZONE (" + maxOiZone.toFixed(2) + ")", paddingLeft + 10, yOi - 4);
        }
        ctx.setLineDash([]); // Reset structure

        const candleSpacing = chartWidth / maxBarsVisible;
        const candleWidth = Math.max(candleSpacing * 0.62, 2.5);

        // 2. RENDER THE OHLC CANDLES AND TECHNICAL INDICATORS
        activeBars.forEach((bar, index) => {
            const x = paddingLeft + (index * candleSpacing) + (candleSpacing / 2) + panOffset;
            if (x < paddingLeft || x > (paddingLeft + chartWidth)) return;

            const yOpen = paddingTop + chartHeight * (1 - (bar.open - minPrice) / finalRange);
            const yClose = paddingTop + chartHeight * (1 - (bar.close - minPrice) / finalRange);
            const yHigh = paddingTop + chartHeight * (1 - (bar.high - minPrice) / finalRange);
            const yLow = paddingTop + chartHeight * (1 - (bar.low - minPrice) / finalRange);

            // Draw Shadows and Bodies
            ctx.strokeStyle = bar.close >= bar.open ? '#089981' : '#f23645';
            ctx.fillStyle = ctx.strokeStyle; ctx.lineWidth = 1.5;
            ctx.beginPath(); ctx.moveTo(x, yHigh); ctx.lineTo(x, yLow); ctx.stroke();
            ctx.fillRect(x - (candleWidth / 2), Math.min(yOpen, yClose), candleWidth, Math.max(2, Math.abs(yClose - yOpen)));

            // Overlay VWAP (Yellow) & Moving Averages lines
            if (index > 0) {
                const prevX = x - candleSpacing;
                const prevBar = activeBars[index-1];
                
                const drawLine = (pVal, cVal, color) => {
                    ctx.strokeStyle = color; ctx.lineWidth = 1.5;
                    ctx.beginPath();
                    ctx.moveTo(prevX, paddingTop + chartHeight * (1 - (pVal - minPrice) / finalRange));
                    ctx.lineTo(x, paddingTop + chartHeight * (1 - (cVal - minPrice) / finalRange));
                    ctx.stroke();
                };
                drawLine(prevBar.vwap, bar.vwap, '#ffeb3b');  // VWAP Yellow
                drawLine(prevBar.ma20, bar.ma20, '#2196f3');  // MA20 Blue
                drawLine(prevBar.supertrend, bar.supertrend, '#e91e63'); // Supertrend Pink
            }
        });

        // 3. SEPARATE SUB-PANEL: LOWER MACD CHARTING SECTION
        const subTop = h - 95; const subHeight = 80;
        ctx.strokeStyle = '#2a2e39'; ctx.strokeRect(paddingLeft, subTop, chartWidth, subHeight);
        ctx.fillStyle = '#848e9c'; ctx.font = '10px sans-serif'; ctx.fillText("MACD (12, 26, 9)", paddingLeft + 5, subTop - 4);

        activeBars.forEach((bar, index) => {
            const x = paddingLeft + (index * candleSpacing) + (candleSpacing / 2) + panOffset;
            const yMacd = subTop + (subHeight / 2) - (bar.macd * 3);
            const ySig = subTop + (subHeight / 2) - (bar.signal * 3);

            ctx.fillStyle = bar.macd >= 0 ? '#089981' : '#f23645';
            ctx.fillRect(x - 1, subTop + (subHeight / 2), 2, -(bar.macd * 2.5));

            if (index > 0) {
                ctx.strokeStyle = '#ff9800'; ctx.beginPath();
                ctx.moveTo(x - candleSpacing, subTop + (subHeight / 2) - (activeBars[index-1].signal * 3));
                ctx.lineTo(x, ySig); ctx.stroke();
            }
        });
    }
</script>
</body>
</html>
