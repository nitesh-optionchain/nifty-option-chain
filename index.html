<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Advanced Live Chart Terminal</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #131722; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden; color: #ffffff;
        }
        #top-header-bar {
            height: 45px; background-color: #1c2030; display: flex; align-items: center;
            padding: 0 15px; border-bottom: 1px solid #2a2e39; font-size: 12px; font-weight: 600;
            overflow-x: auto; white-space: nowrap;
        }
        #top-header-bar::-webkit-scrollbar { display: none; }
        .matrix-item { margin-right: 20px; display: inline-block; }
        .matrix-lbl { color: #848e9c; margin-right: 4px; }
        .matrix-val.green { color: #089981; }
        .matrix-val.orange { color: #ff9800; }
        #chart-container {
            position: relative; width: 100%; height: calc(100vh - 45px);
        }
        canvas { display: block; position: absolute; left: 0; top: 0; width: 100%; height: 100%; }
    </style>
</head>
<body>

<div id="top-header-bar">
    <div class="matrix-item"><span class="matrix-lbl">Asset:</span><span id="lbl-asset" class="matrix-val orange">NIFTY LIVE</span></div>
    <div class="matrix-item"><span class="matrix-lbl">Zone Status:</span><span class="matrix-val green">CONNECTED</span></div>
    <div class="matrix-item"><span class="matrix-lbl">Last Price:</span><span id="lbl-price" class="matrix-val orange">0.00</span></div>
</div>

<div id="chart-container">
    <canvas id="chartCanvas"></canvas>
</div>

<script>
    const canvas = document.getElementById('chartCanvas');
    const ctx = canvas.getContext('2d');
    
    let chartData = [];
    let currentAsset = "NIFTY";

    function resizeCanvas() {
        const container = document.getElementById('chart-container');
        // Handle device pixel ratio for sharp crystal clear candles on mobile screens
        const dpr = window.devicePixelRatio || 1;
        canvas.width = container.clientWidth * dpr;
        canvas.height = container.clientHeight * dpr;
        ctx.scale(dpr, dpr);
        renderChart();
    }

    window.addEventListener('resize', resizeCanvas);

    window.addEventListener('message', function(e) {
        const data = e.data;
        if (data.type === "LIVE_TICK_UPDATE" && data.payload && data.asset) {
            currentAsset = data.asset;
            document.getElementById('lbl-asset').innerText = currentAsset + " LIVE";
            
            if (data.payload[currentAsset]) {
                const rawPrice = data.payload[currentAsset].price / 100;
                document.getElementById('lbl-price').innerText = rawPrice.toFixed(2);
                chartData = data.payload[currentAsset].master_history || [];
                renderChart();
            }
        }
    });

    function renderChart() {
        const container = document.getElementById('chart-container');
        const w = container.clientWidth;
        const h = container.clientHeight;
        
        ctx.clearRect(0, 0, w, h);
        if (!chartData || chartData.length === 0) return;

        const paddingLeft = 15;
        const paddingRight = 70;
        const paddingTop = 30;
        const paddingBottom = 25;

        const chartWidth = w - paddingLeft - paddingRight;
        const chartHeight = h - paddingTop - paddingBottom;

        let maxPrice = -Infinity;
        let minPrice = Infinity;

        chartData.forEach(d => {
            if (d.high > maxPrice) maxPrice = d.high;
            if (d.low < minPrice) minPrice = d.low;
        });

        const priceRange = maxPrice - minPrice;
        const verticalBuffer = priceRange === 0 ? 15.0 : priceRange * 0.2;
        maxPrice += verticalBuffer;
        minPrice -= verticalBuffer;
        const finalRange = maxPrice - minPrice;

        // Draw structural background grid lines
        ctx.strokeStyle = '#2a2e39';
        ctx.lineWidth = 1;
        ctx.fillStyle = '#848e9c';
        ctx.font = '11px sans-serif';

        for (let i = 0; i <= 4; i++) {
            const y = paddingTop + (chartHeight * (i / 4));
            const p = maxPrice - (finalRange * (i / 4));
            ctx.beginPath();
            ctx.moveTo(paddingLeft, y);
            ctx.lineTo(paddingLeft + chartWidth, y);
            ctx.stroke();
            ctx.fillText(p.toFixed(2), paddingLeft + chartWidth + 6, y + 4);
        }

        // PROGRESSIVE MOBILE FIX: Show fewer bars on mobile so it doesn't compress or squash
        const isMobile = w < 600;
        const maxBarsVisible = isMobile ? 25 : 45; 
        
        // Take the latest candles up to our limit
        const activeBars = chartData.slice(-maxBarsVisible);
        
        // Calculate stable horizontal sizing matrix
        const candleSpacing = chartWidth / maxBarsVisible;
        const candleWidth = Math.max(Math.min(candleSpacing * 0.65, 14), 4);

        // FIXED: Shift start offset layout mapping so candles anchor to the RIGHT edge natively
        const startOffset = chartWidth - (activeBars.length * candleSpacing);

        activeBars.forEach((bar, index) => {
            // Left-to-right temporal progression mapping (Latest candle sits on the absolute right edge)
            const x = paddingLeft + startOffset + (index * candleSpacing) + (candleSpacing / 2);
            
            const yOpen = paddingTop + chartHeight * (1 - (bar.open - minPrice) / finalRange);
            const yClose = paddingTop + chartHeight * (1 - (bar.close - minPrice) / finalRange);
            const yHigh = paddingTop + chartHeight * (1 - (bar.high - minPrice) / finalRange);
            const yLow = paddingTop + chartHeight * (1 - (bar.low - minPrice) / finalRange);

            const isGreen = bar.close >= bar.open;
            const color = isGreen ? '#089981' : '#f23645';

            ctx.strokeStyle = color;
            ctx.fillStyle = color;
            ctx.lineWidth = 1.5;

            ctx.beginPath();
            ctx.moveTo(x, yHigh);
            ctx.lineTo(x, yLow);
            ctx.stroke();

            const top = Math.min(yOpen, yClose);
            const bottom = Math.max(yOpen, yClose);
            let height = bottom - top;
            if (height < 2) height = 2;

            ctx.fillRect(x - (candleWidth / 2), top, candleWidth, height);
        });
    }

    setTimeout(resizeCanvas, 150);
</script>

</body>
</html>
