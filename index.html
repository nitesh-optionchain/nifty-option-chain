<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Advanced Interactive Live Chart</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #131722; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
        }
        #chart-container {
            position: relative; width: 100%; height: 100vh;
        }
        canvas {
            display: block; position: absolute; left: 0; top: 0;
        }
    </style>
</head>
<body>

<div id="chart-container">
    <canvas id="chartCanvas"></canvas>
</div>

<script>
    const canvas = document.getElementById('chartCanvas');
    const ctx = canvas.getContext('2d');
    
    let chartData = [];
    let currentAsset = "NIFTY";

    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        renderChart();
    }

    window.addEventListener('resize', resizeCanvas);

    // Listen to live data pipeline from Streamlit Core
    window.addEventListener('message', function(e) {
        const data = e.data;
        if (data.type === "LIVE_TICK_UPDATE" && data.payload && data.asset) {
            currentAsset = data.asset;
            if (data.payload[currentAsset]) {
                chartData = data.payload[currentAsset].master_history || [];
                renderChart();
            }
        }
    });

    if (window.chartData && window.currentAsset) {
        currentAsset = window.currentAsset;
        chartData = window.chartData[currentAsset]?.master_history || [];
    }

    function renderChart() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if (!chartData || chartData.length === 0) return;

        const paddingLeft = 30;
        const paddingRight = 70;
        const paddingTop = 60;
        const paddingBottom = 40;

        const chartWidth = canvas.width - paddingLeft - paddingRight;
        const chartHeight = canvas.height - paddingTop - paddingBottom;

        // Find absolute price boundaries
        let maxPrice = -Infinity;
        let minPrice = Infinity;

        chartData.forEach(d => {
            if (d.high > maxPrice) maxPrice = d.high;
            if (d.low < minPrice) minPrice = d.low;
        });

        // Safe price buffer padding logic to stop horizontal stretch distortions
        const priceRange = maxPrice - minPrice;
        const verticalBuffer = priceRange === 0 ? 30.0 : priceRange * 0.15;
        maxPrice += verticalBuffer;
        minPrice -= verticalBuffer;

        const finalRange = maxPrice - minPrice;

        // Draw structural price coordinate grid lines
        ctx.strokeStyle = '#2a2e39';
        ctx.lineWidth = 1;
        ctx.fillStyle = '#848e9c';
        ctx.font = '11px sans-serif';

        for (let i = 0; i <= 4; i++) {
            const y = paddingTop + (chartHeight * (i / 4));
            const p = maxPrice - (finalRange * (i / 4));
            
            ctx.beginPath();
            ctx.moveTo(paddingLeft, y);
            ctx.lineTo(paddingLeft + chartWidth, y);
            ctx.stroke();
            ctx.fillText(p.toFixed(2), paddingLeft + chartWidth + 8, y + 4);
        }

        // Calibrate candle counts and standard horizontal sizing matrix
        const minBarsVisible = 40; 
        const totalBars = Math.max(chartData.length, minBarsVisible);
        
        // Exact space optimization mapping limits
        const candleSpacing = chartWidth / totalBars;
        const candleWidth = Math.min(Math.max(candleSpacing * 0.55, 4), 18); 

        chartData.forEach((bar, index) => {
            // Center alignment math mapping
            const x = paddingLeft + (index * candleSpacing) + (candleSpacing / 2);
            
            const yOpen = paddingTop + chartHeight * (1 - (bar.open - minPrice) / finalRange);
            const yClose = paddingTop + chartHeight * (1 - (bar.close - minPrice) / finalRange);
            const yHigh = paddingTop + chartHeight * (1 - (bar.high - minPrice) / finalRange);
            const yLow = paddingTop + chartHeight * (1 - (bar.low - minPrice) / finalRange);

            const isGreen = bar.close >= bar.open;
            const color = isGreen ? '#089981' : '#f23645';

            ctx.strokeStyle = color;
            ctx.fillStyle = color;
            ctx.lineWidth = 1.5;

            // 1. Draw standard candle tail/wick lines
            ctx.beginPath();
            ctx.moveTo(x, yHigh);
            ctx.lineTo(x, yLow);
            ctx.stroke();

            // 2. Draw standard solid responsive bar rectangles
            const top = Math.min(yOpen, yClose);
            const bottom = Math.max(yOpen, yClose);
            let height = bottom - top;
            if (height < 1.5) height = 1.5; // Do not disappear flat lines

            ctx.fillRect(x - (candleWidth / 2), top, candleWidth, height);
        });
    }

    // Initialize layout setup rules
    setTimeout(resizeCanvas, 100);
</script>

</body>
</html>
