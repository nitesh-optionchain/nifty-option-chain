<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Advanced Multi-Indicator Terminal</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #131722; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden; color: #ffffff; user-select: none; -webkit-user-select: none;
        }
        #top-header-bar {
            height: 45px; background-color: #1c2030; display: flex; align-items: center;
            padding: 0 15px; border-bottom: 1px solid #2a2e39; font-size: 12px; font-weight: 600;
        }
        .matrix-item { margin-right: 20px; }
        .matrix-lbl { color: #848e9c; margin-right: 4px; }
        .matrix-val.green { color: #089981; }
        .matrix-val.orange { color: #ff9800; }
        #chart-container { position: relative; width: 100%; height: calc(100vh - 45px); touch-action: none; }
        canvas { display: block; position: absolute; left: 0; top: 0; width: 100%; height: 100%; }
    </style>
</head>
<body>

<div id="top-header-bar">
    <div class="matrix-item"><span class="matrix-lbl">Asset:</span><span id="lbl-asset" class="matrix-val orange">NIFTY LIVE</span></div>
    <div class="matrix-item"><span class="matrix-lbl">Zone Status:</span><span class="matrix-val green">CONNECTED</span></div>
    <div class="matrix-item"><span class="matrix-lbl">Last Price:</span><span id="lbl-price" class="matrix-val orange">0.00</span></div>
</div>

<div id="chart-container">
    <canvas id="chartCanvas"></canvas>
</div>

<script>
    const canvas = document.getElementById('chartCanvas');
    const ctx = canvas.getContext('2d');
    
    let chartData = [];
    let maxVolZone = 0;
    let maxOiZone = 0;
    let currentAsset = "NIFTY";

    let zoomLevel = 1.0; let panOffset = 0; let isDragging = false; let startX = 0; let lastTouchDistance = 0;

    function processMessageData(payload) {
        if (!payload) return;
        currentAsset = payload.current_asset || "NIFTY";
        document.getElementById('lbl-asset').innerText = currentAsset + " LIVE";
        document.getElementById('lbl-price').innerText = (payload.price / 100).toFixed(2);
        
        chartData = payload.master_history || [];
        maxVolZone = payload.max_vol_zone || 0;
        maxOiZone = payload.max_oi_zone || 0;
        renderChart();
    }

    // Safety fallback initialization handler layer
    if (window.chartPayload) {
        processMessageData(window.chartPayload);
    }

    window.addEventListener('message', function(e) {
        if (e.data && (e.data.type === "LIVE_TICK_UPDATE" || e.data.type === "DYNAMIC_TERMINAL_RELOAD")) {
            const payload = e.data.data || e.data.payload;
            processMessageData(payload);
        }
    });

    const container = document.getElementById('chart-container');
    container.addEventListener('touchstart', function(e) {
        if (e.touches.length === 1) { isDragging = true; startX = e.touches[0].clientX - panOffset; }
        else if (e.touches.length === 2) { isDragging = false; lastTouchDistance = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY); }
    }, { passive: false });

    container.addEventListener('touchmove', function(e) {
        e.preventDefault();
        if (isDragging && e.touches.length === 1) { panOffset = e.touches[0].clientX - startX; renderChart(); }
        else if (e.touches.length === 2) {
            const currentDistance = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
            if (lastTouchDistance > 0) { zoomLevel = Math.max(0.3, Math.min(zoomLevel * (currentDistance / lastTouchDistance), 4.0)); renderChart(); }
            lastTouchDistance = currentDistance;
        }
    }, { passive: false });

    container.addEventListener('touchend', function() { isDragging = false; lastTouchDistance = 0; });
    container.addEventListener('wheel', function(e) { e.preventDefault(); zoomLevel = Math.max(0.3, Math.min(zoomLevel * (e.deltaY < 0 ? 1.05 : 0.95), 4.0)); renderChart(); }, { passive: false });

    function renderChart() {
        const w = container.clientWidth; const h = container.clientHeight;
        canvas.width = w * (window.devicePixelRatio || 1);
        canvas.height = h * (window.devicePixelRatio || 1);
        ctx.scale(window.devicePixelRatio || 1, window.devicePixelRatio || 1);
        
        ctx.clearRect(0, 0, w, h);
        if (!chartData || chartData.length === 0) return;

        const paddingLeft = 15; const paddingRight = 75; const paddingTop = 30; const paddingBottom = 130;
        const chartWidth = w - paddingLeft - paddingRight; const chartHeight = h - paddingTop - paddingBottom;

        const maxBarsVisible = Math.max(10, Math.round((w < 600 ? 30 : 65) / zoomLevel));
        const activeBars = chartData.slice(-maxBarsVisible);

        let maxPrice = -Infinity; let minPrice = Infinity;
        activeBars.forEach(d => {
            maxPrice = Math.max(maxPrice, d.high, d.vwap, d.ma20);
            minPrice = Math.min(minPrice, d.low, d.vwap, d.ma20);
        });

        if (maxVolZone > 0) { maxPrice = Math.max(maxPrice, maxVolZone); minPrice = Math.min(minPrice, maxVolZone); }
        if (maxOiZone > 0) { maxPrice = Math.max(maxPrice, maxOiZone); minPrice = Math.min(minPrice, maxOiZone); }

        const finalRange = (maxPrice - minPrice) * 1.15 || 20;
        minPrice -= finalRange * 0.05;

        // Draw structural horizontal scale grids
        ctx.strokeStyle = '#2a2e39'; ctx.lineWidth = 1; ctx.fillStyle = '#848e9c'; ctx.font = '11px sans-serif';
        for (let i = 0; i <= 4; i++) {
            const y = paddingTop + (chartHeight * (i / 4));
            ctx.beginPath(); ctx.moveTo(paddingLeft, y); ctx.lineTo(paddingLeft + chartWidth, y); ctx.stroke();
            ctx.fillText((maxPrice - (finalRange * (i / 4))).toFixed(2), paddingLeft + chartWidth + 6, y + 4);
        }

        // Draw Support/Resistance Institutional Levels
        if (maxVolZone > 0) {
            const yV = paddingTop + chartHeight * (1 - (maxVolZone - minPrice) / finalRange);
            ctx.strokeStyle = '#ff9800'; ctx.lineWidth = 2; ctx.setLineDash([6, 4]);
            ctx.beginPath(); ctx.moveTo(paddingLeft, yV); ctx.lineTo(paddingLeft + chartWidth, yV); ctx.stroke();
            ctx.fillStyle = '#ff9800'; ctx.font = 'bold 10px sans-serif'; ctx.fillText("📌 MAX VOL ZONE (" + maxVolZone.toFixed(2) + ")", paddingLeft + 10, yV - 4);
        }
        if (maxOiZone > 0) {
            const yO = paddingTop + chartHeight * (1 - (maxOiZone - minPrice) / finalRange);
            ctx.strokeStyle = '#00bcd4'; ctx.lineWidth = 2; ctx.setLineDash([6, 4]);
            ctx.beginPath(); ctx.moveTo(paddingLeft, yO); ctx.lineTo(paddingLeft + chartWidth, yO); ctx.stroke();
            ctx.fillStyle = '#00bcd4'; ctx.font = 'bold 10px sans-serif'; ctx.fillText("📊 MAX OI ZONE (" + maxOiZone.toFixed(2) + ")", paddingLeft + 10, yO - 4);
        }
        ctx.setLineDash([]);

        const candleSpacing = chartWidth / maxBarsVisible;
        const candleWidth = Math.max(candleSpacing * 0.65, 2.5);

        // Render clean structural continuous indicators paths loop
        activeBars.forEach((bar, index) => {
            const x = paddingLeft + (index * candleSpacing) + (candleSpacing / 2) + panOffset;
            if (x < paddingLeft || x > (paddingLeft + chartWidth)) return;

            const yOpen = paddingTop + chartHeight * (1 - (bar.open - minPrice) / finalRange);
            const yClose = paddingTop + chartHeight * (1 - (bar.close - minPrice) / finalRange);
            const yHigh = paddingTop + chartHeight * (1 - (bar.high - minPrice) / finalRange);
            const yLow = paddingTop + chartHeight * (1 - (bar.low - minPrice) / finalRange);

            ctx.strokeStyle = bar.close >= bar.open ? '#089981' : '#f23645';
            ctx.fillStyle = ctx.strokeStyle; ctx.lineWidth = 1.5;
            ctx.beginPath(); ctx.moveTo(x, yHigh); ctx.lineTo(x, yLow); ctx.stroke();
            ctx.fillRect(x - (candleWidth / 2), Math.min(yOpen, yClose), candleWidth, Math.max(2, Math.abs(yClose - yOpen)));

            if (index > 0) {
                const pX = x - candleSpacing; const pB = activeBars[index - 1];
                const drawOverlayLine = (pVal, cVal, clr) => {
                    if (pVal && cVal) { ctx.strokeStyle = clr; ctx.lineWidth = 1.5; ctx.beginPath(); ctx.moveTo(pX, paddingTop + chartHeight * (1 - (pVal - minPrice) / finalRange)); ctx.lineTo(x, paddingTop + chartHeight * (1 - (cVal - minPrice) / finalRange)); ctx.stroke(); }
                };
                drawOverlayLine(pB.vwap, bar.vwap, '#ffeb3b');       // VWAP (Yellow)
                drawOverlayLine(pB.ma20, bar.ma20, '#2196f3');       // MA20 (Blue)
                drawOverlayLine(pB.supertrend, bar.supertrend, '#e91e63'); // Supertrend (Pink)
            }
        });

        // Lower Sub-Panel (MACD Indicator Display Matrix)
        const subTop = h - 100; const subHeight = 85;
        ctx.strokeStyle = '#2a2e39'; ctx.lineWidth = 1; ctx.strokeRect(paddingLeft, subTop, chartWidth, subHeight);
        ctx.fillStyle = '#848e9c'; ctx.font = '10px sans-serif'; ctx.fillText("MACD (12, 26, 9)", paddingLeft + 6, subTop - 5);

        activeBars.forEach((bar, index) => {
            const x = paddingLeft + (index * candleSpacing) + (candleSpacing / 2) + panOffset;
            if (x < paddingLeft || x > (paddingLeft + chartWidth)) return;

            const yZero = subTop + (subHeight / 2);
            ctx.fillStyle = bar.macd >= 0 ? 'rgba(8, 153, 129, 0.6)' : 'rgba(242, 54, 69, 0.6)';
            ctx.fillRect(x - 1, yZero, 2, -(bar.macd * 3));

            if (index > 0 && bar.signal) {
                ctx.strokeStyle = '#ff9800'; ctx.lineWidth = 1.5; ctx.beginPath();
                ctx.moveTo(x - candleSpacing, yZero - (activeBars[index - 1].signal * 3));
                ctx.lineTo(x, yZero - (bar.signal * 3)); ctx.stroke();
            }
        });
    }

    setTimeout(resizeCanvas, 150);
</script>
</body>
</html>
