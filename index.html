<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Advanced Technical Indicator Terminal</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #131722; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden; color: #ffffff; user-select: none; -webkit-user-select: none;
        }
        #top-header-bar {
            height: 45px; background-color: #1c2030; display: flex; align-items: center;
            padding: 0 15px; border-bottom: 1px solid #2a2e39; font-size: 12px; font-weight: 600;
        }
        .matrix-item { margin-right: 20px; }
        .matrix-lbl { color: #848e9c; margin-right: 4px; }
        .matrix-val.green { color: #089981; }
        .matrix-val.orange { color: #ff9800; }
        #chart-container { position: relative; width: 100%; height: calc(100vh - 45px); touch-action: none; }
        canvas { display: block; position: absolute; left: 0; top: 0; width: 100%; height: 100%; }
    </style>
</head>
<body>

<div id="top-header-bar">
    <div class="matrix-item"><span class="matrix-lbl">Asset:</span><span id="lbl-asset" class="matrix-val orange">NIFTY LIVE</span></div>
    <div class="matrix-item"><span class="matrix-lbl">Zone Status:</span><span class="matrix-val green">CONNECTED</span></div>
    <div class="matrix-item"><span class="matrix-lbl">Last Price:</span><span id="lbl-price" class="matrix-val orange">0.00</span></div>
</div>

<div id="chart-container">
    <canvas id="chartCanvas"></canvas>
</div>

<script>
    const canvas = document.getElementById('chartCanvas');
    const ctx = canvas.getContext('2d');
    
    let chartData = [];
    let currentAsset = "NIFTY";

    // Zoom & Drag Pan Variables
    let zoomLevel = 1.0; 
    let panOffset = 0;   
    let isDragging = false; 
    let startX = 0; 
    let lastTouchDistance = 0;

    function resizeCanvas() {
        const container = document.getElementById('chart-container');
        const dpr = window.devicePixelRatio || 1;
        canvas.width = container.clientWidth * dpr;
        canvas.height = container.clientHeight * dpr;
        ctx.scale(dpr, dpr);
        renderChart();
    }

    window.addEventListener('resize', resizeCanvas);

    window.addEventListener('message', function(e) {
        const data = e.data;
        let payload = null;
        
        if (data.type === "LIVE_TICK_UPDATE" && data.payload) {
            payload = data.payload;
            currentAsset = data.asset || "NIFTY";
        } else if (data.type === "DYNAMIC_TERMINAL_RELOAD" && data.data) {
            payload = data.data;
            currentAsset = payload.current_asset || "NIFTY";
        } else if (data && data.master_history) {
            payload = { [currentAsset]: data };
        }

        if (payload) {
            document.getElementById('lbl-asset').innerText = currentAsset + " LIVE";
            const assetData = payload[currentAsset] || payload;
            if (assetData) {
                if (assetData.price) {
                    document.getElementById('lbl-price').innerText = (assetData.price / 100).toFixed(2);
                }
                chartData = assetData.master_history || [];
                renderChart();
            }
        }
    });

    // Mobile Gestures Interceptors
    const container = document.getElementById('chart-container');
    container.addEventListener('touchstart', function(e) {
        if (e.touches.length === 1) { isDragging = true; startX = e.touches[0].clientX - panOffset; }
    });
    container.addEventListener('touchmove', function(e) {
        if (isDragging && e.touches.length === 1) { panOffset = e.touches[0].clientX - startX; renderChart(); }
    });
    container.addEventListener('touchend', function() { isDragging = false; });

    // ==============================================================================
    // 🎨 CLEAN INDEPENDENT PRICE INDICATORS RENDERING ENGINE
    // ==============================================================================
    function renderChart() {
        const w = container.clientWidth;
        const h = container.clientHeight;
        
        ctx.clearRect(0, 0, w, h);
        if (!chartData || chartData.length === 0) return;

        const paddingLeft = 20;
        const paddingRight = 75;
        const paddingTop = 30;
        const paddingBottom = 130; 

        const chartWidth = w - paddingLeft - paddingRight;
        const chartHeight = h - paddingTop - paddingBottom;

        const isMobile = w < 600;
        const baseBarsCount = isMobile ? 35 : 70;
        const maxBarsVisible = Math.max(12, Math.round(baseBarsCount / zoomLevel));
        
        const activeBars = chartData.slice(-maxBarsVisible);
        const totalActive = activeBars.length;

        // Reset scaling limits strictly using actual price & overlay values
        let maxPrice = -Infinity;
        let minPrice = Infinity;

        activeBars.forEach(d => {
            if (d.high > maxPrice) maxPrice = d.high;
            if (d.low < minPrice) minPrice = d.low;
            if (d.vwap && d.vwap > maxPrice) maxPrice = d.vwap;
            if (d.vwap && d.vwap < minPrice) minPrice = d.vwap;
            if (d.ma20 && d.ma20 > maxPrice) maxPrice = d.ma20;
            if (d.ma20 && d.ma20 < minPrice) minPrice = d.ma20;
            if (d.ma50 && d.ma50 > maxPrice) maxPrice = d.ma50;
            if (d.ma50 && d.ma50 < minPrice) minPrice = d.ma50;
            if (d.supertrend && d.supertrend > maxPrice) maxPrice = d.supertrend;
            if (d.supertrend && d.supertrend < minPrice) minPrice = d.supertrend;
        });

        const priceRange = maxPrice - minPrice;
        const verticalBuffer = priceRange === 0 ? 15.0 : priceRange * 0.12;
        maxPrice += verticalBuffer;
        minPrice -= verticalBuffer;
        const finalRange = maxPrice - minPrice;

        // Horizontal Grid Scale lines
        ctx.strokeStyle = '#2a2e39';
        ctx.lineWidth = 1;
        ctx.fillStyle = '#848e9c';
        ctx.font = '11px sans-serif';

        for (let i = 0; i <= 4; i++) {
            const y = paddingTop + (chartHeight * (i / 4));
            const p = maxPrice - (finalRange * (i / 4));
            ctx.beginPath();
            ctx.moveTo(paddingLeft, y);
            ctx.lineTo(paddingLeft + chartWidth, y);
            ctx.stroke();
            ctx.fillText(p.toFixed(2), paddingLeft + chartWidth + 6, y + 4);
        }

        const candleSpacing = chartWidth / maxBarsVisible;
        const candleWidth = Math.max(candleSpacing * 0.72, 4.5);

        // Plot Candles & Continuous Overlay Lines (Left to Right linear)
        activeBars.forEach((bar, index) => {
            const x = (paddingLeft + chartWidth) - ((totalActive - 1 - index) * candleSpacing) - (candleSpacing / 2) + panOffset;
            if (x < paddingLeft || x > (paddingLeft + chartWidth)) return;

            const yOpen = paddingTop + chartHeight * (1 - (bar.open - minPrice) / finalRange);
            const yClose = paddingTop + chartHeight * (1 - (bar.close - minPrice) / finalRange);
            const yHigh = paddingTop + chartHeight * (1 - (bar.high - minPrice) / finalRange);
            const yLow = paddingTop + chartHeight * (1 - (bar.low - minPrice) / finalRange);

            const isGreen = bar.close >= bar.open;
            const color = isGreen ? '#089981' : '#f23645';

            ctx.strokeStyle = color;
            ctx.fillStyle = color;
            ctx.lineWidth = 1.8;

            ctx.beginPath();
            ctx.moveTo(x, yHigh);
            ctx.lineTo(x, yLow);
            ctx.stroke();

            const top = Math.min(yOpen, yClose);
            const bottom = Math.max(yOpen, yClose);
            let height = bottom - top;
            if (height < 2) height = 2;

            ctx.fillRect(x - (candleWidth / 2), top, candleWidth, height);

            // Connect indicators arrays smoothly
            if (index > 0) {
                const prevX = x - candleSpacing;
                const prevBar = activeBars[index - 1];

                const drawOverlayLine = (pVal, cVal, lineColor, lineWidth = 1.5) => {
                    if (pVal && cVal && pVal >= minPrice && pVal <= maxPrice && cVal >= minPrice && cVal <= maxPrice) {
                        ctx.strokeStyle = lineColor; ctx.lineWidth = lineWidth;
                        ctx.beginPath();
                        ctx.moveTo(prevX, paddingTop + chartHeight * (1 - (pVal - minPrice) / finalRange));
                        ctx.lineTo(x, paddingTop + chartHeight * (1 - (cVal - minPrice) / finalRange));
                        ctx.stroke();
                    }
                };

                drawOverlayLine(prevBar.vwap, bar.vwap, '#ffeb3b', 1.5);             // VWAP (Yellow)
                drawOverlayLine(prevBar.ma20, bar.ma20, '#2196f3', 1.5);             // MA20 (Blue)
                drawOverlayLine(prevBar.ma50, bar.ma50, '#9c27b0', 1.5);             // MA50 (Purple)
                drawOverlayLine(prevBar.supertrend, bar.supertrend, '#e91e63', 1.8); // Supertrend (Pink)
            }
        });

        // Lower MACD subpanel Window
        const subTop = h - 100;
        const subHeight = 85;
        
        ctx.strokeStyle = '#2a2e39';
        ctx.lineWidth = 1;
        ctx.strokeRect(paddingLeft, subTop, chartWidth, subHeight);
        
        ctx.fillStyle = '#848e9c';
        ctx.font = '10px sans-serif';
        ctx.fillText("MACD (12, 26, 9)", paddingLeft + 6, subTop - 5);

        activeBars.forEach((bar, index) => {
            const x = (paddingLeft + chartWidth) - ((totalActive - 1 - index) * candleSpacing) - (candleSpacing / 2) + panOffset;
            if (x < paddingLeft || x > (paddingLeft + chartWidth)) return;

            const macdVal = bar.macd || 0;
            const sigVal = bar.signal || 0;

            const yZero = subTop + (subHeight / 2);
            const yMacdHeight = -(macdVal * 3);

            // Histogram columns
            ctx.fillStyle = macdVal >= 0 ? 'rgba(8, 153, 129, 0.6)' : 'rgba(242, 54, 69, 0.6)';
            ctx.fillRect(x - 1, yZero, 2, yMacdHeight);

            // Signal Orange Line
            if (index > 0) {
                const prevX = x - candleSpacing;
                const prevSig = activeBars[index - 1].signal || 0;
                
                ctx.strokeStyle = '#ff9800'; 
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.moveTo(prevX, yZero - (prevSig * 3));
                ctx.lineTo(x, yZero - (sigVal * 3));
                ctx.stroke();
            }
        });
    }

    setTimeout(resizeCanvas, 150);
</script>

</body>
</html>
